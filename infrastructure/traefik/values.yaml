# 📂 路径: infrastructure/traefik/values.yaml

# 🛡️ 屏蔽官方隐私收集与升级检测
global:
  sendAnonymousUsage: false
  checkNewVersion: false

# 🚀 盲信内网自签证书，避免 502 报错
additionalArguments:
  - "--serversTransport.insecureSkipVerify=true"

deployment:
  enabled: true
  replicas: 2

logs:
  general:
    level: INFO
  access:
    enabled: true

ports:
  web:
   # 🚨 新增：信任网关IP，接受外部的 X-Forwarded-Proto 标头，打破重定向死循环！
    forwardedHeaders:
      trustedIPs:
        - "10.0.0.0/8"       # 包含你 OPNsense 的局域网段
        - "192.168.0.0/16"

    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    # ⚡ 开启下一代 HTTP/3 (QUIC) 加速
    http3:
      enabled: true
    expose:
      default: true

service:
  enabled: true
  type: LoadBalancer
  spec:
    loadBalancerIP: 10.0.10.100 # REPLACE_ME 替换你的ip

# 🔐 全局自动挂载泛域名证书
tlsStore:
  default:
    defaultCertificate:
      secretName: k3s-besthomelab-tech-tls