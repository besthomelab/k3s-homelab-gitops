apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: longhorn-system
  
  sources:
    - repoURL: 'https://charts.longhorn.io'
      chart: longhorn
      targetRevision: 1.11.1
      helm:
        valueFiles:
          - $values/infrastructure/longhorn/values.yaml

    - repoURL: 'https://github.com/besthomelab/k3s-homelab-gitops.git'
      targetRevision: HEAD
      ref: values

  # =======================================================================
  # 🎯 赛博监工执法手册 (Sync Policy)
  # =======================================================================
  syncPolicy:
    automated:
      enabled: true      # 【总开关】基础设施，开启全自动驾驶
      prune: true        # 【自动拆除】Git 删则 K8s 删
      selfHeal: true     # 【自我修复】底层大坝严禁任何人手动篡改，改了立刻恢复
      allowEmpty: false  # 【核爆保护】禁止清空集群
    
    syncOptions:
      - CreateNamespace=true
      # - SkipDryRunOnMissingResource=true
      # - FailOnSharedResource=true
      # - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      # - PruneLast=true
      # - RespectIgnoreDifferences=true

    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
      refresh: true

  ignoreDifferences:
    - group: ""
      kind: Service
      name: longhorn-frontend
      namespace: longhorn-system 
      jqPathExpressions:
        - .spec.ports[].nodePort
