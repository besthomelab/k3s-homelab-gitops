# 1. 节点开洞 (NodePort) - 修复版
apiVersion: v1
kind: Service
metadata:
  name: headlamp-nodeport
  namespace: kube-system
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: headlamp
    app.kubernetes.io/instance: my-headlamp  # 加上这个标签，定位更精准
  ports:
    - port: 80
      targetPort: 4466  # ⚠️ 修复关键：指向真实的容器端口
      nodePort: 32000

---
apiVersion: v1
kind: Service
metadata:
  name: headlamp-access
  namespace: kube-system
spec:
  type: LoadBalancer
  # 🎯 静态 IP 绑定
  # 示例 IP 为 10.0.10.50，请根据你的局域网网段进行修改
  loadBalancerIP: 10.0.10.50  # REPLACE_ME
  selector:
    app.kubernetes.io/name: headlamp
    app.kubernetes.io/instance: my-headlamp
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 4466  # 容器监听端口