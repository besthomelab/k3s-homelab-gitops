apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: headlamp
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: kube-system
  
  sources:
    - repoURL: 'https://kubernetes-sigs.github.io/headlamp/'
      chart: headlamp
      targetRevision: 0.41.0
      helm:
        valueFiles:
          - $values/apps/management/headlamp/values.yaml

    - repoURL: 'https://github.com/besthomelab/k3s-homelab-gitops.git'
      targetRevision: HEAD
      path: apps/management/headlamp  # ⚠️ 连同该目录下的 yaml 一起应用
      ref: values

  # =======================================================================
  # 🎯 赛博监工执法手册 (Sync Policy)
  # =======================================================================
  syncPolicy:
    automated:
      enabled: true      # 【总开关】开启全自动驾驶
      prune: true        # 【自动拆除】Git 删则 K8s 删
      selfHeal: true     # 【自我修复】自动纠正面板被误改的配置
      allowEmpty: false  # 【核爆保护】禁止清空集群
    
    syncOptions:
      - CreateNamespace=true
      # - SkipDryRunOnMissingResource=true
      # - FailOnSharedResource=true
      # - ApplyOutOfSyncOnly=true
      # - ServerSideApply=true
      # - PruneLast=true
      # - RespectIgnoreDifferences=true

    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
      refresh: true