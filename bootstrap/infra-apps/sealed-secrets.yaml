apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: kube-system  # 官方推荐部署在核心系统级命名空间

  sources:
    # 源 1：官方 Helm 图纸
    - repoURL: 'https://bitnami-labs.github.io/sealed-secrets'
      chart: sealed-secrets
      targetRevision: 2.18.5  # 请根据实际情况填入最新 Chart 版本
      helm:
        valueFiles:
          - $values/infrastructure/sealed-secrets/values.yaml

    # 源 2：咱们自己的 Git 仓库
    - repoURL: 'https://github.com/besthomelab/k3s-homelab-gitops.git'
      targetRevision: HEAD
      path: infrastructure/sealed-secrets
      ref: values

  # 🎯 基础设施：开启全自动部署与自我修复
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
      refresh: true