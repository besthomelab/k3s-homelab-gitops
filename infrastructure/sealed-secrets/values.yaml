# -------------------------------------------------------------------------
# 🔐 赛博堡垒：Sealed Secrets 加密守卫
# -------------------------------------------------------------------------

# ⚠️ 核心避坑：Helm 默认会将应用命名为 "sealed-secrets"，
# 但本地的 kubeseal 工具默认去寻找名为 "sealed-secrets-controller" 的服务。
# 为了让它们无缝对接，我们必须强制覆盖名字！
fullnameOverride: sealed-secrets-controller

# 默认开启强校验机制，确保加密规范
strict: true