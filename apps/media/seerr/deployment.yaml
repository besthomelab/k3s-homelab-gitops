apiVersion: apps/v1
kind: Deployment
metadata:
  name: seerr
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: seerr
  template:
    metadata:
      labels:
        app: seerr
    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
      containers:
      - name: seerr
        image: ghcr.io/seerr-team/seerr:latest
        ports:
        - containerPort: 5055
        env:
        - name: LOG_LEVEL
          value: "info"
        - name: TZ
          value: "Asia/Shanghai"
        - name: PORT
          value: "5055"
        # --- PostgreSQL 数据库配置 ---
        - name: DB_TYPE
          value: "postgres"
        - name: DB_HOST
          value: "homelab-db-cluster-rw.database"
        - name: DB_PORT
          value: "5432"
        - name: DB_USER
          value: "seerr_user"
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: media-db-secret
              key: postgres-password
        - name: DB_NAME
          value: "seerr"
        - name: DB_LOG_QUERIES
          value: "false"
        volumeMounts:
        - name: config
          mountPath: /app/config
        readinessProbe:
          httpGet:
            path: /api/v1/status
            port: 5055
          initialDelaySeconds: 20
          periodSeconds: 15
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: seerr-config-pvc