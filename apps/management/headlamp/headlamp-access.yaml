# 1. 节点开洞 (NodePort) - 最终修正版
apiVersion: v1
kind: Service
metadata:
  name: headlamp-nodeport
  namespace: kube-system
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: headlamp
    # 🎯 修正：自动部署的实例名通常就是 headlamp
    app.kubernetes.io/instance: headlamp  
  ports:
    - port: 80
      targetPort: 4466
      nodePort: 32000

---
# 2. 靓号接入 (LoadBalancer) - 最终修正版
apiVersion: v1
kind: Service
metadata:
  name: headlamp-access
  namespace: kube-system
spec:
  type: LoadBalancer
  # 🎯 赛博靓号：固定住 10.0.10.50
  loadBalancerIP: 10.0.10.50  # REPLACE_ME -> 替换为你规划的 IP
  selector:
    app.kubernetes.io/name: headlamp
    app.kubernetes.io/instance: headlamp
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 4466  