apiVersion: "cilium.io/v2"
kind: CiliumLoadBalancerIPPool
metadata:
  name: "homelab-pool"
spec:
  blocks:
    - start: "10.0.10.50"    # REPLACE_ME -> 替换为你局域网规划的起始 IP
      stop: "10.0.10.200"    # REPLACE_ME -> 替换为你局域网规划的结束 IP
---
apiVersion: "cilium.io/v2alpha1"
kind: CiliumL2AnnouncementPolicy
metadata:
  name: "default-l2-policy"
spec:
  interfaces:
    - ^enp6s18               # REPLACE_ME -> ⚠️ 极度危险：千万换成你自己的物理网卡名！
    #- ^eth1                 # REPLACE_ME -> (可选) 如果有多个需要广播的物理网卡，请在此追加
  loadBalancerIPs: true      # 允许广播 LB IP
  externalIPs: true          # 允许广播 External IP