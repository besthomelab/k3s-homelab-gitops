apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg-operator
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: cnpg-system  # 官方推荐部署在核心系统级命名空间

  sources:
    # 源 1：官方 Helm 图纸
    - repoURL: 'https://cloudnative-pg.github.io/charts'
      chart: cloudnative-pg
      targetRevision: 0.28.0  # REPLACE_ME 请根据实际情况填入最新 Chart 版本 helm search repo cnpg/cloudnative-pg --versions | head -n 5
      helm:
        valueFiles:
          - $values/infrastructure/cloudnativepg/values.yaml

    # 源 2：咱们自己的 Git 仓库
    - repoURL: 'https://github.com/besthomelab/k3s-homelab-gitops.git'
      targetRevision: HEAD
      path: infrastructure/cloudnativepg
      ref: values

  # 🎯 基础设施：开启全自动部署与自我修复
  syncPolicy:
    automated:
      enabled: false
      prune: false
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
      refresh: true