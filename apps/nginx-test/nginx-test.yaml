# -------------------------------------------------------------------------
# 🏗️ 赛博靶机：Nginx 纯静态测试应用
# -------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-test
  namespace: apps  # 🎯 部署在业务层 Namespace
  labels:
    app: nginx-test
spec:
  replicas: 1      # 测试靶机，1 个实例就够了
  selector:
    matchLabels:
      app: nginx-test
  template:
    metadata:
      labels:
        app: nginx-test
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80

---
# -------------------------------------------------------------------------
# 🚪 赛博迎宾门：LoadBalancer 暴露服务
# -------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: nginx-test-svc
  namespace: apps
  annotations:
    io.cilium/lb-ipam-ips: "10.0.10.88" 
spec:
  type: LoadBalancer
  selector:
    app: nginx-test
  ports:
  - name: http
    port: 80
    targetPort: 80