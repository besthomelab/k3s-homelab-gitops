# 📂 路径: infrastructure/traefik/values.yaml

deployment:
  enabled: true
  replicas: 2

ports:
  web:
    # 🚀 新版强制 HTTPS 跳转的合法语法
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    # ⚠️ 什么都不用写！删掉 tls: enabled。新版直接由下方的 tlsStore 接管。
    expose:
      default: true

service:
  enabled: true
  type: LoadBalancer
  spec:
    loadBalancerIP: 10.0.10.100

tlsStore:
  default:
    defaultCertificate:
      secretName: k3s-besthomelab-tech-tls