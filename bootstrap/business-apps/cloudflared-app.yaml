apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflared
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: traefik

  source:
      repoURL: 'https://github.com/besthomelab/k3s-homelab-gitops.git'
      targetRevision: HEAD
      path: apps/cloudflared  # 存放云探针具体 YAML 的路径
      directory:
          # 🎯 赛博过滤网：排除所有包含 template 的文件
          # 确保 ArgoCD 只加载加密后的 SealedSecret 和 Deployment
          exclude: '*template*'

  # =======================================================================
  # 🎯 赛博监工执法手册 (Sync Policy)
  # =======================================================================
  syncPolicy:
    automated:
      enabled: false      # 【总开关】开启全自动驾驶
      prune: true        # 【自动拆除】Git 删则 K8s 删
      selfHeal: true     # 【自我修复】自动纠正面板被误改的配置
      allowEmpty: false  # 【核爆保护】禁止清空集群
    
    syncOptions:
      - CreateNamespace=true

    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
      refresh: true