# 1. 逻辑服务：定义名字和端口映射
apiVersion: v1
kind: Service
metadata:
  name: <应用名称>-svc
  namespace: <命名空间>
spec:
  ports:
    - protocol: TCP
      port: <K8s集群内访问端口>
      targetPort: <物理设备实际端口>
---
# 2. 物理落地：定义具体的物理 IP
apiVersion: v1
kind: Endpoints
metadata:
  name: <应用名称>-svc  # ⚠️ 必须与 Service 名字完全一致
  namespace: <命名空间>
subsets:
  - addresses:
      - ip: <物理设备IP地址>
    ports:
      - port: <物理设备实际端口>
---
# 3. Traefik 入口：定义域名和访问协议
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: <应用名称>-ingress
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`<访问域名>`)
      kind: Rule
      services:
        - name: <应用名称>-svc
          port: <K8s集群内访问端口>
          scheme: <http_或_https> # ⚠️ 原站是 https 此处必须写 https
  tls: {}